[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# ============================================================
# REDIRECT SPA — o Netlify serve os index.html estáticos das
# subpastas (gerados pelo prerender) ANTES de cair neste catch-all.
# ============================================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================================
# HEADERS DE CACHE (performance / Core Web Vitals)
# ============================================================

# Assets com hash no nome: cache de 1 ano, imutável
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imagens: cache de 30 dias
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Favicons e logo: 7 dias
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML: sempre revalidar (atualizações aparecem na hora)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap e robots: revalidar diariamente
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================================
# HEADERS DE SEGURANÇA (confiança / boas práticas)
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
